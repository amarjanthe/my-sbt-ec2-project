apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-sbt-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-sbt-app
  template:
    metadata:
      labels:
        app: my-sbt-app
    spec:
      containers:
        - name: my-sbt-container
          image: <+artifacts.primary.image>
          ports:
            - containerPort: 9000
